<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Catálogo</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}

body{

  background: linear-gradient(100deg, rgb(237, 132, 4),rgb(139, 10, 10),rgb(202, 185, 31));
  color:#1f2937;
  background-repeat: no-repeat;
background-size: cover;
min-height: 100vh;
}

.header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#fff;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 6px 20px rgba(0,0,0,.08);
  z-index:10;
}

.header h1{
  font-size:1.2rem;
}

.container{
  padding:80px 14px 20px;
  max-width:900px;
  margin:auto;
}

.search{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-bottom:12px;
}

.product-list{
  display:grid;
  gap:10px;
}

.item{
  display:flex;
  gap:10px;
  background:#fff;
  padding:10px;
  border-radius:14px;
  align-items:center;
}

.item img{
  width:60px;
  height:60px;
  border-radius:10px;
  object-fit:cover;
  background:#eee;
}

.item-info{
  flex:1;
}

.item-title{
  font-weight:700;
  font-size:.95rem;
}

.item-price{
  font-size:.85rem;
  color:#555;
}

.item-actions{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.item-actions button{
  padding:6px 10px;
  font-size:.8rem;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.edit{background:#2563eb;color:#fff}
.delete{background:#dc2626;color:#fff}

/* BOTON FLOTANTE */
.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#16a34a;
  color:#fff;
  font-size:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:none;
  box-shadow:0 10px 25px rgba(0,0,0,.25);
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:flex-end;
  z-index:20;
}

.modal.show{
  display:flex;
}

.modal-box{
  background:#fff;
  width:100%;
  max-height:90vh;
  border-radius:20px 20px 0 0;
  padding:16px;
  overflow:auto;
}

.field{
  margin-bottom:10px;
}

.field input,
.field textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
}

textarea{
  min-height:80px;
}

.img-preview{
  width:100%;
  height:180px;
  background:#eee;
  border-radius:12px;
  margin-bottom:10px;
  object-fit:cover;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:6px;
  font-weight:700;
  cursor:pointer;
}

.save{background:#000000;border: 1px solid rgb(221, 197, 11);color:#fff}
.delete-btn{background:#dc2626;color:#fff}
.upload{background:#16a34a;color:#fff}
.cancel{background:#e5e7eb}

.logout{
  background:#111827;
  color:#fff;
  padding:8px 12px;
  border:none;
  border-radius:10px;
}

/* LOGIN */
#loginBox{
  max-width:350px;
  text-align: center;
  color: #ffffff;
  margin:80px auto;
  background:#000000;
  padding:20px;
  border-radius:16px;
  box-shadow: 0 1px 13px rgb(0, 0, 0);
}

.lab{
    margin: 6px;
    padding: 10px;
    width: auto;
    min-width: 300px;
    border-radius: 10px;
    border-color: #f2f2f2;
}

</style>
</head>

<body>
    <div id="loginBox">
  <h3>Ingreso admin</h3>
  <input class="lab" id="loginEmail" placeholder="Email">
  <input class="lab" id="loginPassword" type="password" placeholder="Contraseña">
  <button id="loginBtn" class="btn save">Ingresar</button>
  <div id="loginStatus"></div>
</div>

<div id="adminApp" style="display:none;">

<div class="header">
  <h1>Productos</h1>
  <button id="logoutBtn" class="logout">Salir</button>
</div>

<div class="container">
  <input id="searchInput" class="search" placeholder="Buscar...">
  <div id="productList" class="product-list"></div>
</div>

<button class="fab" id="addBtn">+</button>

<div class="modal" id="modal">
  <div class="modal-box">

    <img id="preview" class="img-preview" src="">

    <div class="field">
      <input id="title" placeholder="Título">
    </div>

    <div class="field">
      <input id="price" placeholder="Precio">
    </div>

    <div class="field">
      <textarea id="description" placeholder="Descripción"></textarea>
    </div>

    <div class="field">
      <input id="imageUrl" placeholder="URL imagen">
    </div>

    <div class="field">
      <input type="file" id="imageFile">
    </div>

    <button id="uploadBtn" class="btn upload">Subir imagen</button>
    <button id="saveBtn" class="btn save">Guardar</button>
    <button id="deleteBtn" class="btn delete-btn" style="display:none;">Eliminar</button>
    <button id="cancelBtn" class="btn cancel">Cancelar</button>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, doc,
  updateDoc, deleteDoc, onSnapshot, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth, signInWithEmailAndPassword,
  onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { firebaseConfig, IMGBB_API_KEY, APP_CONFIG } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* LOGIN */
loginBtn.onclick = async ()=>{
  try{
    await signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value);
  }catch{
    loginStatus.innerText="Error login";
  }
};

logoutBtn.onclick=()=>signOut(auth);

onAuthStateChanged(auth,(user)=>{
  loginBox.style.display=user?"none":"block";
  adminApp.style.display=user?"block":"none";
});

/* MODAL */
const modal=document.getElementById("modal");
const addBtn=document.getElementById("addBtn");
const cancelBtn=document.getElementById("cancelBtn");

addBtn.onclick=()=>{
  modal.classList.add("show");
  clearForm();
};

cancelBtn.onclick=()=>modal.classList.remove("show");

/* CRUD */
let products=[];
let editId=null;

function render(){
  productList.innerHTML="";
  products.forEach(p=>{
    const div=document.createElement("div");
    div.className="item";
    div.innerHTML=`
      <img src="${p.imageUrl||'https://via.placeholder.com/100'}">
      <div class="item-info">
        <div class="item-title">${p.title}</div>
        <div class="item-price">${p.price}</div>
      </div>
      <div class="item-actions">
        <button class="edit">Edit</button>
        <button class="delete">X</button>
      </div>
    `;

    div.querySelector(".edit").onclick=()=>{
      editId=p.id;
      modal.classList.add("show");
      title.value=p.title;
      price.value=p.price;
      description.value=p.description;
      imageUrl.value=p.imageUrl;
      preview.src=p.imageUrl;
      deleteBtn.style.display="block";
    };

    div.querySelector(".delete").onclick=async ()=>{
      await deleteDoc(doc(db,"products",p.id));
    };

    productList.appendChild(div);
  });
}

onSnapshot(collection(db,"products"),snap=>{
  products=snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});

/* SAVE */
saveBtn.onclick=async ()=>{
  const data={
    title:title.value,
    price:price.value,
    description:description.value,
    imageUrl:imageUrl.value,
    active:true,
    updatedAt:serverTimestamp()
  };

  if(editId){
    await updateDoc(doc(db,"products",editId),data);
  }else{
    await addDoc(collection(db,"products"),data);
  }

  modal.classList.remove("show");
};

deleteBtn.onclick=async ()=>{
  if(editId){
    await deleteDoc(doc(db,"products",editId));
    modal.classList.remove("show");
  }
};

/* IMG */
uploadBtn.onclick=async ()=>{
  const file=imageFile.files[0];
  const form=new FormData();
  form.append("image",file);

  const res=await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`,{
    method:"POST",body:form
  });

  const data=await res.json();
  imageUrl.value=data.data.url;
  preview.src=data.data.url;
};

function clearForm(){
  editId=null;
  title.value="";
  price.value="";
  description.value="";
  imageUrl.value="";
  preview.src="";
  deleteBtn.style.display="none";
}
</script>

</body>
</html>
