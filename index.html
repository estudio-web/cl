<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
    body{
      background:#f4f6f9;
      color:#1f2937;
      padding:16px;
    }
    .container{
      max-width:1200px;
      margin:0 auto;
    }
    .topbar{
      background:#fff;
      border-radius:18px;
      padding:18px;
      box-shadow:0 10px 30px rgba(0,0,0,.07);
      position:sticky;
      top:10px;
      z-index:10;
      margin-bottom:18px;
    }
    .topbar h1{
      font-size:1.6rem;
      margin-bottom:8px;
    }
    .topbar p{
      color:#6b7280;
      margin-bottom:14px;
      font-size:.95rem;
    }
    .search{
      width:100%;
      padding:14px 16px;
      border:1px solid #d1d5db;
      border-radius:14px;
      font-size:1rem;
      outline:none;
    }
    .search:focus{
      border-color:#2563eb;
      background:#fff;
    }
    .status{
      margin-top:12px;
      color:#6b7280;
      font-size:.92rem;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:14px;
    }
    .card{
      background:#fff;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 8px 24px rgba(0,0,0,.06);
      cursor:pointer;
      transition:.18s ease;
      border:1px solid #edf2f7;
    }
    .card:hover{
      transform:translateY(-3px);
      box-shadow:0 14px 30px rgba(0,0,0,.09);
    }
    .thumb{
      width:100%;
      height:190px;
      object-fit:cover;
      background:#e5e7eb;
    }
    .content{
      padding:14px;
    }
    .title{
      font-size:1rem;
      font-weight:700;
      margin-bottom:8px;
      line-height:1.3;
      min-height:42px;
    }
    .desc{
      font-size:.9rem;
      color:#6b7280;
      line-height:1.4;
      min-height:38px;
      margin-bottom:12px;
    }
    .bottom{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
    }
    .price{
      font-size:1.05rem;
      font-weight:800;
      color:#111827;
    }
    .tag{
      font-size:.8rem;
      background:#eef2ff;
      color:#3730a3;
      padding:6px 10px;
      border-radius:999px;
      white-space:nowrap;
    }
    .empty, .loading{
      text-align:center;
      padding:32px 10px;
      color:#6b7280;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.68);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:999;
    }
    .modal.show{
      display:flex;
    }
    .modal-box{
      background:#fff;
      width:100%;
      max-width:480px;
      border-radius:22px;
      overflow:hidden;
      box-shadow:0 24px 60px rgba(0,0,0,.28);
      position:relative;
    }
    .modal-img{
      width:100%;
      height:300px;
      object-fit:cover;
      background:#e5e7eb;
    }
    .modal-body{
      padding:18px;
    }
    .modal-body h2{
      font-size:1.35rem;
      margin-bottom:8px;
    }
    .modal-body p{
      color:#6b7280;
      line-height:1.5;
      margin-bottom:14px;
      white-space:pre-line;
    }
    .modal-price{
      font-size:1.2rem;
      font-weight:800;
      margin-bottom:14px;
    }
    .btn-whatsapp{
      display:inline-block;
      width:100%;
      text-align:center;
      padding:14px 16px;
      border-radius:14px;
      background:#16a34a;
      color:#fff;
      text-decoration:none;
      font-weight:700;
    }
    .close{
      position:absolute;
      top:10px;
      right:10px;
      width:40px;
      height:40px;
      border:none;
      border-radius:50%;
      background:rgba(17,24,39,.75);
      color:#fff;
      font-size:1.2rem;
      cursor:pointer;
    }

    @media (max-width:600px){
      .thumb{height:160px}
      .modal-img{height:240px}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h1>Catálogo</h1>
      <p>Buscá rápido por nombre, descripción o precio.</p>
      <input type="text" id="searchInput" class="search" placeholder="Buscar producto..." />
      <div class="status" id="statusText">Cargando productos...</div>
    </div>

    <div id="loading" class="loading">Cargando catálogo...</div>
    <div id="grid" class="grid" style="display:none;"></div>
    <div id="empty" class="empty" style="display:none;">No se encontraron productos.</div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-box">
      <button class="close" id="closeModal">&times;</button>
      <img id="modalImg" class="modal-img" src="" alt="Producto" />
      <div class="modal-body">
        <h2 id="modalTitle"></h2>
        <p id="modalDesc"></p>
        <div class="modal-price" id="modalPrice"></div>
        <a id="whatsappBtn" class="btn-whatsapp" href="#" target="_blank">Consultar por WhatsApp</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { firebaseConfig, APP_CONFIG } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const searchInput = document.getElementById("searchInput");
    const statusText = document.getElementById("statusText");
    const loading = document.getElementById("loading");
    const grid = document.getElementById("grid");
    const empty = document.getElementById("empty");

    const modal = document.getElementById("modal");
    const closeModal = document.getElementById("closeModal");
    const modalImg = document.getElementById("modalImg");
    const modalTitle = document.getElementById("modalTitle");
    const modalDesc = document.getElementById("modalDesc");
    const modalPrice = document.getElementById("modalPrice");
    const whatsappBtn = document.getElementById("whatsappBtn");

    let allProducts = [];

    function escapeHtml(text = "") {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function getPlaceholder(title = "Producto") {
      return `https://via.placeholder.com/700x700?text=${encodeURIComponent(title)}`;
    }

    function openModal(product) {
      modalImg.src = product.imageUrl || getPlaceholder(product.title);
      modalTitle.textContent = product.title || "Sin título";
      modalDesc.textContent = product.description || "Sin descripción";
      modalPrice.textContent = product.price || `${APP_CONFIG.currencySymbol}0`;

      const msg = `Hola, quiero consultar por: ${product.title || "producto"} - ${product.price || ""}`;
      whatsappBtn.href = `https://wa.me/${APP_CONFIG.whatsappNumber}?text=${encodeURIComponent(msg)}`;

      modal.classList.add("show");
    }

    function renderProducts(list) {
      grid.innerHTML = "";

      if (!list.length) {
        grid.style.display = "none";
        empty.style.display = "block";
        statusText.textContent = "0 productos encontrados";
        return;
      }

      empty.style.display = "none";
      grid.style.display = "grid";
      statusText.textContent = `${list.length} producto(s)`;

      list.forEach(product => {
        const article = document.createElement("article");
        article.className = "card";
        article.innerHTML = `
          <img class="thumb" src="${product.imageUrl || getPlaceholder(product.title)}" alt="${escapeHtml(product.title || "Producto")}">
          <div class="content">
            <div class="title">${escapeHtml(product.title || "Sin título")}</div>
            <div class="desc">${escapeHtml(product.description || "Sin descripción")}</div>
            <div class="bottom">
              <div class="price">${escapeHtml(product.price || `${APP_CONFIG.currencySymbol}0`)}</div>
              <div class="tag">${product.active ? "Disponible" : "Oculto"}</div>
            </div>
          </div>
        `;
        article.addEventListener("click", () => openModal(product));
        grid.appendChild(article);
      });
    }

    function filterProducts() {
      const term = searchInput.value.toLowerCase().trim();

      const filtered = allProducts.filter(p => {
        if (!p.active) return false;
        return (
          (p.title || "").toLowerCase().includes(term) ||
          (p.description || "").toLowerCase().includes(term) ||
          (p.price || "").toLowerCase().includes(term)
        );
      });

      renderProducts(filtered);
    }

    onSnapshot(collection(db, APP_CONFIG.collectionName), (snapshot) => {
      allProducts = snapshot.docs.map(doc => ({
        id: doc.id,
        ...doc.data()
      }));

      loading.style.display = "none";
      filterProducts();
    }, (error) => {
      loading.textContent = "Error al cargar productos.";
      statusText.textContent = "No se pudo conectar con Firestore";
      console.error(error);
    });

    searchInput.addEventListener("input", filterProducts);

    closeModal.addEventListener("click", () => modal.classList.remove("show"));
    modal.addEventListener("click", (e) => {
      if (e.target === modal) modal.classList.remove("show");
    });
  </script>
</body>
</html>
